site_name: GitHub Documentation Core
site_description: Authoritative, developer-focused documentation for the GitHub REST API — including Quick Start, Tutorials, How-to Guides, Explanations, and full API Reference.
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.tabs.link
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/custom.css


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Welcome: index.md
  - Quick Start: quickstart.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Hello World: tutorials/hello-world.md
      - Resource Interlinking: tutorials/resource-interlinking.md
      - Security Hardening: tutorials/security-hardening.md
  - How-to Guides:
      - Overview: how-to/index.md
      - Manage Repositories: how-to/manage-repositories.md
      - Automate Issues: how-to/automate-issues.md
      - Manage Organizations: how-to/manage-organizations.md
      - Search and Discover: how-to/search-and-discover.md
      - Manage GitHub Actions: how-to/manage-actions.md
  - Explanations:
      - Overview: explanations/index.md
      - Authentication: explanations/authentication.md
      - Rate Limiting: explanations/rate-limiting.md
      - System Architecture: explanations/system-architecture.md
  - API Reference:
      - Apps: api-reference/app.md
      - Applications: api-reference/applications.md
      - Authorizations: api-reference/authorizations.md
      - Codes of Conduct: api-reference/codes-of-conduct.md
      - Gists: api-reference/gists.md
      - Gitignore Templates: api-reference/gitignore-templates.md
      - Installation: api-reference/installation.md
      - Licenses: api-reference/licenses.md
      - Marketplace: api-reference/marketplace-listing.md
      - Notifications: api-reference/notifications.md
      - Organizations: api-reference/orgs-org.md
      - Projects: api-reference/projects.md
      - Repositories: api-reference/repos.md
      - Search: api-reference/search.md
      - Teams: api-reference/teams-team-id.md
      - User: api-reference/user.md
      - Users: api-reference/users.md
      - System:
          - Markdown: api-reference/markdown.md
          - Billing: api-reference/enterprises-enterprise-id-settings-billing.md
          - SCIM: api-reference/scim-v2-organizations-org-users.md
